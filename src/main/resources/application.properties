quarkus.http.cors=true
quarkus.http.cors.origins=*
quarkus.http.cors.methods=GET,POST,OPTIONS
quarkus.http.cors.headers=Content-Type,Authorization,Accept
quarkus.http.cors.exposed-headers=Content-Type
quarkus.http.cors.access-control-allow-credentials=false

quarkus.mailer.from=${MAIL_FROM:noreply@gmail.com}
quarkus.mailer.host=${MAIL_HOST:smtp.gmail.com}
quarkus.mailer.port=${MAIL_PORT:587}
quarkus.mailer.start-tls=REQUIRED
quarkus.mailer.username=${MAIL_USERNAME}
quarkus.mailer.password=${MAIL_PASSWORD}
quarkus.swagger-ui.always-include=true
quarkus.smallrye-openapi.path=/swagger
quarkus.log.console.enable=true
quarkus.log.console.format=%d{HH:mm:ss} %-5p [%c{2.}] %s%e%n
quarkus.log.category."io.vertx.ext.mail".level=DEBUG
quarkus.log.category."io.quarkus.mailer".level=DEBUG
quarkus.mailer.mock=false
quarkus.log.level=INFO
quarkus.http.host=0.0.0.0
quarkus.http.port=${PORT:8080}